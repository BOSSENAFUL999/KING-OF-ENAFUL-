name: BOSS ENAFUL BOT RUNNER

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # প্রতি ৬ ঘণ্টা পর অটো রিস্টার্ট হবে
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Running BOSS ENAFUL Bot
        run: node index.js
        timeout-minutes: 350 # ৫ ঘণ্টা ৫০ মিনিট পর সেভলি বন্ধ হয়ে আবার স্টার্ট হবে
